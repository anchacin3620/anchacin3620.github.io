    border: 1px dashed #ccc;

    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;

    color: var(--accent-color);
    font-weight: bold;
    margin-bottom: 10px;

    justify-content: space-between;
    align-items: center;

    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn:hover {
    background: #002244;
  }

  .btn:disabled {
    background: #ccc;
    cursor: not-allowed;
  }

  .slide-counter {

    color: var(--light-text);

  .jump-select {
    padding: 8px;

    border: 1px solid #ccc;

  .fade-in {

  }

    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    .slide-stage { padding: 15px; }
    .defensa-title { font-size: 1rem; }

  // --- LÓGICA DE LA APLICACIÓN ---
  let currentSlideIndex = 0;
  const stage = document.getElementById('slide-stage');
  const counter = document.getElementById('slide-counter');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  const jumpSelect = document.getElementById('jump-select');

  // Inicializar select de salto
  slides.forEach((slide, index) => {
    const option = document.createElement('option');
    option.value = index;
    option.text = slide.title;
    jumpSelect.appendChild(option);
  });

  function renderSlide(index) {
    const slide = slides[index];
    
    // Efecto de desvanecimiento: removemos clase, forzamos reflow, añadimos clase
    stage.classList.remove('fade-in');
    void stage.offsetWidth; // trigger reflow
    stage.classList.add('fade-in');

    stage.innerHTML = `
      <div class="slide-badge">Lámina ${index + 1} de ${slides.length}</div>
      <h2 style="margin-top:0; color: var(--primary-color);">${slide.title}</h2>
      
      <div class="visual-container">
        <div class="visual-icon">${slide.visualIcon}</div>
        <div class="visual-description">${slide.visualDesc}</div>
      </div>

      <div class="speech-container">
        <span class="speech-label">Guión de Presentación:</span>
        ${slide.speech}
      </div>
    `;

    // Actualizar estado de controles
    counter.innerText = `${index + 1} / ${slides.length}`;
    jumpSelect.value = index;
    
    btnPrev.disabled = index === 0;
    btnNext.disabled = index === slides.length - 1;

    // Scroll suave hacia el inicio de la presentación en móviles
    if(window.innerWidth < 600) {
       document.getElementById('luz-defensa-container').scrollIntoView({behavior: 'smooth'});
    }
  }

  function nextSlide() {
    if (currentSlideIndex < slides.length - 1) {
      currentSlideIndex++;
      renderSlide(currentSlideIndex);
    }
  }

  function prevSlide() {
    if (currentSlideIndex > 0) {
      currentSlideIndex--;
      renderSlide(currentSlideIndex);
    }
  }

  function goToSlide(value) {
    currentSlideIndex = parseInt(value);
    renderSlide(currentSlideIndex);
  }

  // Soporte para teclas de flecha
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') nextSlide();
    if (e.key === 'ArrowLeft') prevSlide();
  });

  // Render inicial
  renderSlide(0);

</script>
